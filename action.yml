name: 'Totem Shield'
description: 'Run Totem Shield quality gate on PR diffs — enforce architectural lessons in CI'
branding:
  icon: 'shield'
  color: 'purple'

inputs:
  model:
    description: 'Override the orchestrator model for shield analysis'
    required: false
  working-directory:
    description: 'Directory to run shield in (defaults to repository root)'
    required: false
    default: '.'
  pr-comment:
    description: 'Post a totem-lint summary comment on the PR (requires GITHUB_TOKEN)'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Sync Totem index
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npx @mmnto/cli sync

    - name: Run Totem Shield
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        MODEL: ${{ inputs.model }}
      run: |
        if [ -n "$MODEL" ]; then
          npx @mmnto/cli shield --model "$MODEL"
        else
          npx @mmnto/cli shield
        fi

    - name: Post PR lint comment
      if: "!cancelled() && inputs.pr-comment == 'true' && github.event_name == 'pull_request'"
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        GH_TOKEN: ${{ github.token }}
      run: npx @mmnto/cli lint --pr-comment "${{ github.event.pull_request.number }}"
