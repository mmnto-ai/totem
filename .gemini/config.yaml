# Gemini Code Assist Configuration for Totem
# Docs: https://developers.google.com/gemini-code-assist/docs/customize-gemini-behavior-github

code_review:
  # Only HIGH+ severity issues trigger comments (not MEDIUM/LOW)
  comment_severity_threshold: HIGH
  # Limit comments per PR to reduce noise
  max_review_comments: 5
  pull_request_opened:
    help: false # Don't post help message on every PR
    summary: false # off — CR already summarizes; keep GCA fully silent on open (no quota for a redundant summary)
    code_review: false # on-demand — vendor-verified that `/gemini review` still triggers when this is off (mmnto-ai/totem-strategy#501 bot-protocols)
    include_drafts: true # Review draft PRs too

# File Exclusions (glob patterns)
ignore_patterns:
  # LanceDB artifacts
  - '**/.lancedb/**'
  - '**/.totem/**'

  # Test fixtures
  - '**/__fixtures__/**'
  - '**/__mocks__/**'

  # Generated/build output
  - '**/dist/**'
  - '**/build/**'

  # Dependencies
  - '**/node_modules/**'
  - 'pnpm-lock.yaml'

  # Test files (CR handles these, GCA adds noise)
  - '**/*.test.ts'
  - '**/*.spec.ts'

# Persistent memory
memory_config:
  disabled: false

have_fun: false
