language: en-US
early_access: true
tone_instructions: >-
  Direct, technical. Flag real issues only. Totem is deterministic governance — Sensors not Actuators. Core engine (totem lint) is zero-LLM and offline. No statistical replacements, no coupling primitives, no cloud deps in enforcement. Tenets win.

reviews:
  profile: chill
  high_level_summary: true
  high_level_summary_in_walkthrough: true
  sequence_diagrams: true
  estimate_code_review_effort: true
  related_prs: true
  related_issues: true
  assess_linked_issues: true
  review_details: true
  poem: true

  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false

  path_instructions:
    - path: 'packages/core/**'
      instructions: 'Core library — LanceDB store, compiler, rule engine. No CLI or MCP dependencies. All LanceDB interactions must stay in this package. Exported functions need TSDoc.'
    - path: 'packages/mcp/**'
      instructions: 'MCP server for AI agents. Sanitize all inputs. XML-wrap all responses. No shell: true on spawn calls.'
    - path: 'packages/cli/**'
      instructions: "CLI commands. All imports must be lazy-loaded (dynamic import). log.error() must use 'Totem Error' as the tag."
    - path: '.totem/lessons/**'
      instructions: "Lesson files. Heading text (after '## Lesson — ') must be ≤60 chars. Only lessons with **Pattern:** field are Pipeline 1 and require Engine/Severity. Lessons without Pattern are Pipeline 2 (prose only) — do not flag missing fields."
    - path: '.claude/**'
      instructions: 'Claude Code hooks and skills. Bash scripts must use [[ ]] glob matching, not echo|grep. CLAUDE.md must stay under 50 lines.'
    - path: 'scripts/**'
      instructions: 'Dev-only diagnostic scripts. Not production code. Empty catch blocks are acceptable here for resilience. Do not flag unused variables in throwaway scripts.'
    - path: 'README.md'
      instructions: 'User-facing documentation. No GitHub issue/PR references (#NNN). No internal jargon (Pipeline 1/2, ADR numbers). No marketing absolutes (guarantees, comprehensive). No emojis.'

  path_filters:
    - '!**/.lancedb/**'
    - '!**/dist/**'
    - '!**/node_modules/**'

  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: true

  pre_merge_checks:
    docstrings:
      mode: 'off'
    title:
      mode: 'warning'
    description:
      mode: 'warning'

  tools:
    ast-grep:
      enabled: true
      essential_rules: true
    eslint:
      enabled: true
    shellcheck:
      enabled: true
    markdownlint:
      enabled: true

knowledge_base:
  learnings:
    scope: auto
  code_guidelines:
    enabled: true
  pull_requests:
    scope: auto
  issues:
    scope: auto
  web_search:
    enabled: true
