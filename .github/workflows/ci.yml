name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm test

      - name: Wind Tunnel (rule fixture tests)
        run: node packages/cli/dist/index.js test

      - run: pnpm lint

      - run: pnpm format:check

  wind-tunnel-sha:
    name: Wind Tunnel SHA Integrity
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' &&
      !contains(github.event.pull_request.title, '[WIND-TUNNEL-UPDATE]') &&
      !contains(github.event.pull_request.body, '[WIND-TUNNEL-UPDATE]')
    steps:
      - uses: actions/checkout@v4

      - name: Verify wind tunnel SHA
        run: bash tools/update-wind-tunnel-sha.sh --verify
