name: Shield

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deterministic-shield:
    name: Deterministic Shield
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Run totem lint
        run: node packages/cli/dist/index.js lint

      - name: Generate SARIF report
        if: always()
        run: node packages/cli/dist/index.js lint --format sarif --out totem-shield.sarif

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: totem-shield.sarif
          category: totem-shield

      - name: Run drift check
        run: node packages/cli/dist/index.js drift
