name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Version & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Allow tag overwrites for republish resilience
        run: git config --global push.followTags false

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: Push release tags
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          # Tag each package version if not already tagged
          for pkg in packages/*/package.json; do
            name=$(node -p "require('./$pkg').name")
            version=$(node -p "require('./$pkg').version")
            tag="${name}@${version}"
            if ! LC_ALL=C git rev-parse "${tag}" >/dev/null 2>&1; then
              LC_ALL=C git tag "${tag}"
              echo "Tagged ${tag}"
            fi
          done
          git push origin --tags --force
          git tag -f v0
          git push origin refs/tags/v0 --force
