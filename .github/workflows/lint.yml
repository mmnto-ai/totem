name: Lint

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Totem Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Run totem lint (PR diff)
        run: |
          # Ensure the base branch is available for diff
          git fetch origin ${{ github.base_ref }} --depth=1
          node packages/cli/dist/index.js lint

      - name: Generate SARIF report
        if: always()
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1 2>/dev/null || true
          node packages/cli/dist/index.js lint --format sarif --out totem-lint.sarif || true

      - name: Upload SARIF to GitHub Security
        if: always() && hashFiles('totem-lint.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: totem-lint.sarif
          category: totem-lint

      - name: Run drift check
        run: node packages/cli/dist/index.js drift
