name: Release Lite Binary

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach binaries to (e.g. @mmnto/cli@1.12.0)'
        required: true

permissions:
  contents: write

jobs:
  build-lite:
    strategy:
      # fail-fast disabled so one platform's cap breach doesn't cancel the
      # others — we want to learn the true cost on every target per run.
      fail-fast: false
      matrix:
        include:
          # Per-platform size caps calibrated to Bun 1.2.x standalone runtime cost
          # per target. Linux x64 is ~40 MB heavier than darwin-arm64 due to
          # statically-linked glibc + ICU data. Windows is provisional — tighten
          # after the first successful run produces measured data. See strategy
          # proposal 214 (Correction/Addendum).
          - os: ubuntu-latest
            target: linux-x64
            bun-target: bun-linux-x64
            artifact: totem-lite-linux-x64
            warn_mb: 120
            hard_mb: 140
          - os: macos-latest
            target: darwin-arm64
            bun-target: bun-darwin-arm64
            artifact: totem-lite-darwin-arm64
            warn_mb: 75
            hard_mb: 90
          - os: windows-latest
            target: win32-x64
            bun-target: bun-windows-x64
            artifact: totem-lite-win32-x64.exe
            warn_mb: 120
            hard_mb: 140
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.x

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Bundle with esbuild
        run: node packages/cli/build/esbuild-lite.mjs

      - name: Bundle size gate (granular — user-controlled payload only)
        shell: bash
        # Asserts the esbuild output directory (our TS + WASM surface) stays under
        # 15 MB. Current baseline is ~6 MB, so this gives ~2.5x headroom. This gate
        # cleanly separates "our bloat" (e.g. an LLM SDK accidentally un-externalized
        # would leak several MB here) from "Bun's bloat" (the ~60 MB runtime embedded
        # by bun build --compile). See strategy proposal 214 for context.
        run: |
          BUNDLE_DIR="packages/cli/dist/lite"
          if [ ! -d "$BUNDLE_DIR" ]; then
            echo "::error::Bundle directory not found: $BUNDLE_DIR"
            exit 1
          fi
          # Use node for a cross-platform recursive size measurement. `du -sb` is GNU-only
          # and `stat` has different flags across Linux/macOS — node is already on the
          # runner and gives us a single correct answer everywhere.
          BYTES=$(node -e '
            const fs = require("fs");
            const path = require("path");
            const walk = (dir) =>
              fs.readdirSync(dir, { withFileTypes: true }).reduce((sum, entry) => {
                const p = path.join(dir, entry.name);
                return sum + (entry.isDirectory() ? walk(p) : fs.statSync(p).size);
              }, 0);
            console.log(walk(process.argv[1]));
          ' "$BUNDLE_DIR")
          MB=$((BYTES / 1024 / 1024))
          echo "Bundle directory size (pre-Bun compile): ${MB}MB (${BYTES} bytes)"
          LIMIT=$((15 * 1024 * 1024))
          if [ "$BYTES" -gt "$LIMIT" ]; then
            echo "::error::Bundle directory exceeds 15MB granular cap (${MB}MB). This suggests a leak in the esbuild config — check the externals list in packages/cli/build/esbuild-lite.mjs and ensure LLM SDKs (openai, @anthropic-ai/sdk, @google/genai) and heavy deps (vectordb, apache-arrow) are still excluded."
            exit 1
          fi

      - name: Compile with Bun
        # shell: bash is required — the multi-line command uses backslash line
        # continuations, which PowerShell (the default on windows-latest) parses
        # as a ParserError. This was a latent bug from PR #1200 masked by matrix
        # fail-fast for 3 releases; exposed when fail-fast was disabled in #1266
        # and windows finally reached this step. See strategy proposal 214.
        shell: bash
        run: |
          bun build --compile \
            --target=${{ matrix.bun-target }} \
            packages/cli/dist/lite/totem-lite.mjs \
            --outfile packages/cli/dist/lite/bin/${{ matrix.artifact }}

      - name: Size gate (final binary)
        shell: bash
        # Final-binary thresholds are per-platform matrix variables because
        # Bun 1.2.x's standalone runtime cost varies materially by target
        # (darwin-arm64: ~62 MB, linux-x64: ~104 MB, win32-x64: TBD). A blanket
        # cap would leave a large blind spot on the smaller platforms. See
        # strategy proposal 214 (Correction/Addendum). The granular bundle gate
        # above is the real defense against bundle leaks; these final-binary
        # caps are the end-to-end ceiling per platform.
        #
        # Comparisons are byte-precise, not megabyte-truncated — a 90.9 MB binary
        # would otherwise pass a `$MB -gt 90` check. See lesson-d1d43e9e.
        env:
          WARN_MB: ${{ matrix.warn_mb }}
          HARD_MB: ${{ matrix.hard_mb }}
        run: |
          FILE="packages/cli/dist/lite/bin/${{ matrix.artifact }}"
          if [ ! -f "$FILE" ]; then
            echo "Binary not found: $FILE"
            exit 1
          fi
          SIZE=$(stat -c%s "$FILE" 2>/dev/null || stat -f%z "$FILE" 2>/dev/null)
          DISPLAY_MB=$((SIZE / 1024 / 1024))
          WARN_LIMIT=$((WARN_MB * 1024 * 1024))
          HARD_LIMIT=$((HARD_MB * 1024 * 1024))
          echo "Binary size: ${DISPLAY_MB}MB (${SIZE} bytes) — platform ${{ matrix.target }} caps: warn=${WARN_MB}MB hard=${HARD_MB}MB"
          if [ "$SIZE" -gt "$HARD_LIMIT" ]; then
            echo "::error::Binary exceeds ${HARD_MB}MB hard limit (${DISPLAY_MB}MB)"
            exit 1
          elif [ "$SIZE" -gt "$WARN_LIMIT" ]; then
            echo "::warning::Binary exceeds ${WARN_MB}MB target (${DISPLAY_MB}MB) but under ${HARD_MB}MB cap"
          fi

      - name: Smoke test (non-cross-compiled only)
        if: matrix.target != 'darwin-arm64' || runner.arch == 'ARM64'
        shell: bash
        run: |
          FILE="packages/cli/dist/lite/bin/${{ matrix.artifact }}"
          chmod +x "$FILE" 2>/dev/null || true
          "$FILE" --version | grep -q "lite" && echo "Version check passed" || echo "Version check: no lite marker (non-fatal)"
          "$FILE" doctor --help && echo "Doctor help passed"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: packages/cli/dist/lite/bin/${{ matrix.artifact }}

  attach-to-release:
    needs: build-lite
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: binaries

      - name: Determine release tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Attach binaries to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for dir in binaries/*/; do
            for file in "$dir"*; do
              echo "Uploading: $file"
              gh release upload "${{ steps.tag.outputs.tag }}" "$file" \
                --repo "${{ github.repository }}" \
                --clobber
            done
          done
