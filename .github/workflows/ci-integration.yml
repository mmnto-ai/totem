name: Integration Smoke Tests

on:
  schedule:
    - cron: '0 6 * * *' # 6 AM UTC daily
  workflow_dispatch:

jobs:
  smoke:
    name: Smoke (${{ matrix.provider }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        provider: [gemini, anthropic]

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Install optional peer deps needed for SDK smoke tests
      - run: pnpm --filter @mmnto/cli add @google/genai @anthropic-ai/sdk

      - run: pnpm build

      - name: Run integration smoke tests + adversarial eval harness
        # pnpm 10+ removed the implicit exec fallback for filtered runs — bare
        # `vitest` resolves as a (nonexistent) package script, so exec explicitly.
        run: pnpm --filter @mmnto/cli exec vitest run --config vitest.integration.config.ts
        env:
          CI_INTEGRATION: 'true'
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
